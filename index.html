<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>加载中...</title>
<script>
(function(){
  const PASS = "271828"; // ← 改密码
  const input = prompt("Password：");
  if (input === null || input !== PASS) {
    document.body.style.background = "#1e1e1e";
    document.body.innerHTML = "<h1 style='color:#fff;text-align:center;margin-top:40vh'>禁止访问</h1>";
    throw new Error("denied");
  }
})();
</script>
<style>
/* 你原来的样式原封不动 */
body{background:#1e1e1e;color:#fff;font-family:sans-serif;display:flex;justify-content:center;padding-top:20px}
.chat{width:95%;max-width:600px;height:90vh;background:#2a2a2a;border-radius:12px;display:flex;flex-direction:column;overflow:hidden}
.header{padding:14px;background:#333;text-align:center}
.msgs{flex:1;padding:12px;overflow:auto;background:#222;line-height:1.6}
.msg{margin:6px 0;padding:6px 10px;border-radius:6px;max-width:85%}
.me{background:#0078d4;margin-left:auto}
.other{background:#444}
.input{display:flex;padding:10px;gap:8px;background:#333}
input{flex:1;padding:8px;background:#222;color:#fff;border:none;border-radius:6px}
button{padding:8px 16px;background:#0078d4;color:#fff;border:none;border-radius:6px;cursor:pointer}
</style>
</head>
<body>
<div class="chat">
<div class="header">💬聊天室</div>
<div class="msgs" id="msgs"></div>
<div class="input">
<input id="nick" placeholder="昵称" value="家人">
<input id="text" placeholder="说点什么…" onkeydown="if(event.key==='Enter')send()">
<button onclick="send()">发送</button>
</div>
</div>

<script>
// ====== Token 混淆（防随手复制）======
const _t0="ghp_";               // ← 拆开 Token
const _t1="Z2BwhirqwbwHeY0";               // ← 第一部分
const _t2="Osk1ukEskSXnSUJ0PKWuu";               // ← 第二部分
const TOKEN=_t0+_t1+_t2;        // 拼接

const REPO="YunLun-p/YunLun-p.github.io";
const BRANCH="data";
const msgsDiv=document.getElementById("msgs");
const nickInput=document.getElementById("nick");
const textInput=document.getElementById("text");

async function loadToday(){
  const d=new Date();
  const p=`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}.md`;
  const r=await fetch(`https://api.github.com/repos/${REPO}/contents/${p}?ref=${BRANCH}`,{
    headers:{Authorization:`token ${TOKEN}`,"User-Agent":"family"}
  });
  if(r.status===404)return;
  const j=await r.json(),c=atob(j.content);
  c.split("\n").forEach(l=>{
    const m=l.match(/^- \[(\d{2}:\d{2})\] \[(.+?)\]: (.+)$/);
    if(m)show(m[2],m[3],m[1]);
  });
}
function show(n,t,time){
  const d=document.createElement("div");
  d.className="msg "+(n===nickInput.value?"me":"other");
  d.innerHTML=`<div style="font-size:12px;color:#aaa">${time} ${n}</div>${t}`;
  msgsDiv.appendChild(d);
  msgsDiv.scrollTop=msgsDiv.scrollHeight;
}
async function send(){
  const txt=textInput.value.trim();if(!txt)return;
  const nick=nickInput.value||"家人";
  const now=new Date();
  const time=`${now.getHours().toString().padStart(2,"0")}:${now.getMinutes().toString().padStart(2,"0")}`;
  const line=`- [${time}] [${nick}]: ${txt}\n`;
  show(nick,txt,time);textInput.value="";
  const p=`${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}.md`;
  const r=await fetch(`https://api.github.com/repos/${REPO}/contents/${p}?ref=${BRANCH}`,{
    headers:{Authorization:`token ${TOKEN}`,"User-Agent":"family"}
  });
  let sha=null,content=line;
  if(r.status!==404){const j=await r.json();sha=j.sha;content=atob(j.content)+line;}
  await fetch(`https://api.github.com/repos/${REPO}/contents/${p}?ref=${BRANCH}`,{
    method:"PUT",
    headers:{Authorization:`token ${TOKEN}`,"Content-Type":"application/json","User-Agent":"family"},
    body:JSON.stringify({message:"chat",content:btoa(content),sha,branch:BRANCH})
  });
}
loadToday();
</script>
</body>
</html>
